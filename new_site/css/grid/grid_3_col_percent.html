<html>
<head>
    <style>
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .grid-item-10 {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            width: 10%;
        }
        .grid-item-80 {
            background-color: #f0f0f0;
            padding: 20px;
            text-align: center;
            width: 70%;
        }
    </style>
</head>
<body>
<div class="grid-container">
    <div class="grid-item-10">Column 1</div>
    <div class="grid-item-80">Column 2</div>
    <div class="grid-item-10">Column 3</div>
</div>
</body>
</html>
