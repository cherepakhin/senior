<html>
<head>

        .grid-container {
            display: grid;
            grid-template-columns: auto auto;
            gap: 10px;
        }
        .grid-item {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
<div class="grid-container">
    <div class="grid-item">Item 1</div>
    <div class="grid-item">Item 2</div>
    <div class="grid-item">Item 3</div>
    <div class="grid-item">Item 4</div>
</div>
</body>
</html>
