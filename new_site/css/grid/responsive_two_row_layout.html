<html>
<head>
    <style>
        .grid-container {
            display: grid;
            grid-template-rows: auto auto;
            gap: 15px;
        }

        .grid-item {
            background-color: #e0e0e0;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="grid-container">
    <div class="grid-item">Row 1</div>
    <div class="grid-item">Row 2</div>
</div>
</body>
</html>
